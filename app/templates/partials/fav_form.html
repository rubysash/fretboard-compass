<div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-200 shadow-inner animate-in slide-in-from-right duration-300">
    <form 
        hx-post="/favorites/save" 
        hx-include="#theory-form"
        hx-swap="outerHTML"
        class="space-y-3"
    >
        <div>
            <label class="block text-[10px] font-black text-indigo-400 uppercase mb-1">Favorite Title</label>
            <input 
                type="text" 
                name="fav_name" 
                value="{{ default_name }}"
                placeholder="e.g. Jazzy Winter"
                class="w-full px-3 py-2 rounded-lg border border-indigo-200 focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-sm"
            >
        </div>
        <div>
            <label class="block text-[10px] font-black text-indigo-400 uppercase mb-1">Notes / Description</label>
            <textarea 
                name="fav_description" 
                placeholder="e.g. Played with distortion, bridge pickup..."
                rows="2"
                class="w-full px-3 py-2 rounded-lg border border-indigo-200 focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-xs"
            ></textarea>
        </div>
        <div class="flex gap-2">
            <button 
                type="submit"
                class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg text-xs transition-all"
            >
                Save to List
            </button>
            <button 
                type="button"
                onclick="this.closest('div.bg-indigo-50').remove()"
                class="px-3 py-2 text-slate-400 hover:text-slate-600 font-bold text-xs"
            >
                Cancel
            </button>
        </div>
    </form>
</div>
